spring:
  application:
    name: BunnyCal


  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Pool sizing — budget for the busiest concurrent paths per JVM:
      #   - public booking / availability request threads: ~Tomcat threads (default 200)
      #     but each request typically holds at most one connection, briefly.
      #   - OutboxWorker poll (1s interval, REQUIRES_NEW tx): 1
      #   - BookingSyncWorkerScheduler (per-job REQUIRES_NEW after P1): up to batch-size
      #     concurrent at the worst case, but the scheduler serializes through
      #     processPending → so practically 1 at a time per pod.
      #   - CalendarSyncScheduler (per-connection REQUIRES_NEW after P1): 1 at a time.
      #   - BookingSyncReconciler (per-job REQUIRES_NEW after P1): 1 at a time.
      #   - IdempotencyService uses up to 3 nested tx per request (REQUIRES_NEW +
      #     REQUIRED + REQUIRES_NEW for failure caching) → budget 3 per concurrent
      #     POST /api/bookings or /public/.../book.
      # 30 is a generous default for a single 2-vCPU pod. Override via env for
      # larger pods or when scaling Tomcat thread count.
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:30}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      # Fail fast when the pool is exhausted instead of queuing request threads
      # indefinitely. The default (30s) hides incidents — 5s surfaces them as
      # 500s with a clear "could not obtain connection" stack.
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT_MS:5000}
      # Catch leaked connections in dev/staging. 30s is well above any legitimate
      # transaction after P1 (per-job sync tx ≤ ~2s). Logged as WARN, not fatal.
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_MS:30000}
      # Close idle connections after 10 min so the pool shrinks back to
      # minimum-idle during quiet periods.
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT_MS:600000}
      # Validate connections older than 30 min to avoid silently using stale
      # ones after Postgres-side reconfiguration or transient network blips.
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME_MS:1800000}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: email-smtp.ap-south-1.amazonaws.com
    port: 587
    username: ${AWS_SES_SMTP_USERNAME}
    password: ${AWS_SES_SMTP_PASSWORD}

  docker:
    compose:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          microsoft:
            provider: microsoft
            client-id: ${MICROSOFT_CLIENT_ID:disabled-microsoft-client-id}
            client-secret: ${MICROSOFT_CLIENT_SECRET:disabled-microsoft-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
              - offline_access
              - User.Read
              - Calendars.ReadWrite
              - Calendars.Read
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/discovery/v2.0/keys
            user-name-attribute: sub

jdbc:
  opentelemetry:
    # Prometheus requires stable tag keys per metric name. Query analysis can
    # conditionally emit db.collection.name, which breaks jdbc_query_* schema.
    # Keep JDBC metrics enabled but disable conditional query analysis tags.
    analysis:
      enabled: ${JDBC_OPENTELEMETRY_ANALYSIS_ENABLED:false}

management:
  otlp:
    metrics:
      export:
        enabled: false
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
        step: 10s
        connect-timeout: 2s
        read-timeout: 5s

  metrics:
    tags:
      application: ${spring.application.name}

  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

jwt:
  secret: ${JWT_SECRET:dev-only-change-me-with-32-plus-characters-this-is-my-super-long-secret}
  expiration: ${JWT_EXPIRATION:3600000}

auth:
  access-token:
    cookie-fallback-enabled: ${AUTH_ACCESS_TOKEN_COOKIE_FALLBACK_ENABLED:true}
  refresh-token:
    bytes: ${REFRESH_TOKEN_BYTES:48}
    ttl-days: ${REFRESH_TOKEN_TTL_DAYS:1}

logging:
  level:
    org.flywaydb: INFO
    io.bunnycal.calendar.http: INFO
    io.bunnycal.sync.scheduler: INFO
    io.bunnycal.sync.reconcile: INFO
    io.bunnycal.availability.trace: INFO

calendar:
  sync:
    # Phase 4 parallel sweep. Default OFF: the scheduler runs the original single-threaded
    # path until parallel-enabled is flipped, so deploying this is a no-op behavior change.
    # See CalendarSyncScheduler for the no-overlap invariant that sweep-max-runtime protects.
    parallel-enabled: ${CALENDAR_SYNC_PARALLEL_ENABLED:false}
    # Worker-pool size. Kept conservative for the first rollout and at/below the per-provider
    # concurrency gate (concurrency.google/microsoft, default 32) so the gate — not the pool —
    # bounds outbound provider fan-out. Raise cautiously while watching the Hikari pool.
    parallelism: ${CALENDAR_SYNC_PARALLELISM:8}
    # Short, non-blocking gate acquire: a worker waits at most this long for a provider permit
    # before deferring the connection to the next sweep, so a saturated provider never ties up
    # a worker that could process the other provider's connections.
    provider-acquire-timeout-ms: ${CALENDAR_SYNC_PROVIDER_ACQUIRE_TIMEOUT_MS:150}
    # Hard per-run deadline. MUST stay strictly below the @SchedulerLock lockAtMostFor (PT2M)
    # so every sweep returns inside the ShedLock window and cross-replica overlap is impossible.
    sweep-max-runtime: ${CALENDAR_SYNC_SWEEP_MAX_RUNTIME:PT25S}
    # Webhook-fresh poll gating. Default OFF. When enabled, a connection with a fresh
    # (non-expired) webhook channel is polled only on the backstop cadence below instead of
    # every tick — webhooks still deliver real-time changes, so the poll becomes a backstop.
    # Watchless/expired-channel connections keep the every-tick cadence. No connection is ever
    # dropped from sync. Evaluate only after the parallel sweep is stable in production.
    webhook-fresh-gating-enabled: ${CALENDAR_SYNC_WEBHOOK_FRESH_GATING_ENABLED:false}
    # Backstop poll interval for fresh-webhook connections: they re-enter the due set once
    # lastSyncedAt is older than this.
    webhook-fresh-backstop: ${CALENDAR_SYNC_WEBHOOK_FRESH_BACKSTOP:PT15M}
    incremental:
      enabled: ${CALENDAR_SYNC_INCREMENTAL_ENABLED:true}
      shadow-mode: ${CALENDAR_SYNC_INCREMENTAL_SHADOW_MODE:false}
      stale-cursor-max-age-hours: ${CALENDAR_SYNC_INCREMENTAL_STALE_CURSOR_MAX_AGE_HOURS:168}
  webhook:
    enabled: ${CALENDAR_WEBHOOK_ENABLED:false}
    auth:
      require-signature: ${CALENDAR_WEBHOOK_REQUIRE_SIGNATURE:true}
      max-skew-seconds: ${CALENDAR_WEBHOOK_MAX_SKEW_SECONDS:300}
    replay-capture:
      enabled: ${CALENDAR_WEBHOOK_REPLAY_CAPTURE_ENABLED:true}
    provider:
      google:
        enabled: ${CALENDAR_WEBHOOK_PROVIDER_GOOGLE_ENABLED:true}
        address: ${GOOGLE_WEBHOOK:http://localhost:8080/integrations/calendar/webhooks/google}
      microsoft:
        enabled: ${CALENDAR_WEBHOOK_PROVIDER_MICROSOFT_ENABLED:true}
        address: ${MICROSOFT_WEBHOOK:http://localhost:8080/integrations/calendar/webhooks/microsoft}
        ttl-seconds: ${CALENDAR_WEBHOOK_PROVIDER_MICROSOFT_TTL_SECONDS:7200}
    shared-secret: ${CALENDAR_WEBHOOK_SHARED_SECRET:lLYWom3PdS2yEbUiWtpokV5iFih4-c0KIlH1zLowYYGVrmOUkvzREm9M8_g3Y9kF}
  google:
    diagnostics:
      enabled: ${CALENDAR_GOOGLE_DIAGNOSTICS_ENABLED:true}
  security:
    encryption-key-base64: ${CALENDAR_TOKEN_ENCRYPTION_KEY_BASE64:x3Y8K1vQm2Zp9LfJrT6wNcHsUaEdBg4y5i0cV7nRkPw=}
    oauth-state-secret: ${CALENDAR_OAUTH_STATE_SECRET:askjdfhiasuhjuisdfjhfiwuehsjdfbkawdkfhaisuebfkjadsfhailsduh11!#%kjdfha@+=}

sync:
  projection:
    accept-ambiguous: ${SYNC_PROJECTION_ACCEPT_AMBIGUOUS:false}
  reconcile:
    external-lifecycle:
      enabled: ${SYNC_RECONCILE_EXTERNAL_LIFECYCLE_ENABLED:true}
  invariants:
    fail-fast: ${SYNC_INVARIANTS_FAIL_FAST:false}

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/integrations/calendar/google/callback}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    frontend-success-path: ${GOOGLE_FRONTEND_SUCCESS_PATH:/dashboard/integrations}
    frontend-error-path: ${GOOGLE_FRONTEND_ERROR_PATH:/calendar-error}
    frontend-success-redirect: ${GOOGLE_FRONTEND_SUCCESS_REDIRECT:}
    frontend-error-redirect: ${GOOGLE_FRONTEND_ERROR_REDIRECT:}
    scopes:
      - openid
      - email
      - profile
      - https://www.googleapis.com/auth/calendar.events
      - https://www.googleapis.com/auth/calendar.readonly

microsoft:
  oauth:
    client-id: ${MICROSOFT_CLIENT_ID:}
    client-secret: ${MICROSOFT_CLIENT_SECRET:}
    tenant-id: ${MICROSOFT_TENANT_ID:common}
    redirect-uri: ${MICROSOFT_REDIRECT_URI:http://localhost:8080/integrations/calendar/microsoft/callback}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    frontend-success-path: ${MICROSOFT_FRONTEND_SUCCESS_PATH:/dashboard/integrations}
    frontend-error-path: ${MICROSOFT_FRONTEND_ERROR_PATH:/calendar-error}
    frontend-success-redirect: ${MICROSOFT_FRONTEND_SUCCESS_REDIRECT:}
    frontend-error-redirect: ${MICROSOFT_FRONTEND_ERROR_REDIRECT:}
    scopes:
      - openid
      - profile
      - email
      - offline_access
      - User.Read
      - Calendars.ReadWrite
      - Calendars.Read

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:5173}
  admin-base-url: ${APP_ADMIN_BASE_URL:http://localhost:5174}
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173}
      admin-allowed-origins: ${APP_SECURITY_CORS_ADMIN_ALLOWED_ORIGINS:http://localhost:5174}
  docs:
    public-enabled: ${APP_DOCS_PUBLIC_ENABLED:false}
  embed:
    token-secret: ${APP_EMBED_TOKEN_SECRET:9f4c7d8e2a1b6c5d7e8f9a0b1c2d3e4f}
    token-ttl-seconds: ${APP_EMBED_TOKEN_TTL_SECONDS:7200}

# Admin portal. Set admin.bootstrap.email to an existing user's email to grant them
# SUPER_ADMIN on startup (idempotent). Leave blank once the first super-admin exists.
admin:
  bootstrap:
    email: ${ADMIN_BOOTSTRAP_EMAIL:}

booking:
  confirm:
    async-calendar:
      enabled: ${BOOKING_CONFIRM_ASYNC_CALENDAR_ENABLED:true}
    shadow-compare:
      enabled: ${BOOKING_CONFIRM_SHADOW_COMPARE_ENABLED:false}
  public:
    require-capability-token: ${BOOKING_PUBLIC_REQUIRE_CAPABILITY_TOKEN:true}
    capability-token-ttl-days: ${BOOKING_PUBLIC_CAPABILITY_TOKEN_TTL_DAYS:14}
    capability-token-legacy-cutoff: ${BOOKING_PUBLIC_CAPABILITY_TOKEN_LEGACY_CUTOFF:}
  notifications:
    enabled: ${BOOKING_NOTIFICATIONS_ENABLED:true}
    # From is aligned with the iTIP ORGANIZER identity at send time (Outlook treats
    # From != ORGANIZER as a foreign invite). Keep this mailbox SPF/DKIM/DMARC-aligned.
    from: ${BOOKING_NOTIFICATIONS_FROM:calendar@logpulse.dev}
    calendar-organizer-email: ${BOOKING_NOTIFICATIONS_CALENDAR_ORGANIZER_EMAIL:calendar@logpulse.dev}
    calendar-organizer-name: ${BOOKING_NOTIFICATIONS_CALENDAR_ORGANIZER_NAME:BunnyCal Calendar}
    # Debug only: when set to a directory path, the fully rendered outbound MIME
    # message is written as a .eml file before SES send, for raw cross-client diffing.
    # Leave empty to disable (no prod impact).
    debug-eml-dir: ${BOOKING_NOTIFICATIONS_DEBUG_EML_DIR:/tmp/bunnycal-eml}

billing:
  # Master switch for the SaaS subscription billing module. Disabled by default so
  # dev/test boot without provider credentials; enable in environments that have the
  # active provider's secrets configured. Mirrors the booking.notifications.enabled pattern.
  enabled: ${BILLING_ENABLED:false}
  # Active payment provider: "stripe" (direct merchant) or "dodo" (Merchant of Record).
  # Switching providers is a single env-var change — no code change. Selects which
  # PaymentProvider bean loads (@ConditionalOnProperty).
  provider: ${BILLING_PROVIDER:stripe}
  # Exposes /api/admin/billing (coupons, promo codes, manual discounts). Off by default;
  # there is no admin-role system yet, so keep this disabled outside trusted operators.
  admin:
    enabled: ${BILLING_ADMIN_ENABLED:false}
  # Public-facing trial length for the single Phase-1 plan (days). The plan row in
  # subscription_plans is the source of truth; this is the seed/default.
  # 14 days per Product Specification v1.0, Chapter 2 §10 / Chapter 3 BR-002.
  trial-days: ${BILLING_TRIAL_DAYS:14}
  # Grace window after a failed renewal before access is revoked (PAST_DUE -> EXPIRED).
  grace-days: ${BILLING_GRACE_DAYS:3}
  # Trial-ending reminders run daily; dunning sweep runs hourly. ShedLock-guarded.
  trial-reminder:
    cron: ${BILLING_TRIAL_REMINDER_CRON:0 0 9 * * *}
  dunning:
    cron: ${BILLING_DUNNING_CRON:0 30 * * * *}
  notifications:
    enabled: ${BILLING_NOTIFICATIONS_ENABLED:false}
    from: ${BILLING_NOTIFICATIONS_FROM:billing@logpulse.dev}
  # Processor / Merchant-of-Record fee rate (basis points; 500 = 5%) used to ESTIMATE fees
  # and net in the admin Revenue report. Per-transaction fees are not persisted, so this is
  # an estimate. 0 (default) = not configured: the report shows fees/net as unavailable.
  fees:
    processor-percent-bps: ${BILLING_FEES_PROCESSOR_PERCENT_BPS:0}
  # Provider-neutral redirect URLs for hosted Checkout / Customer Portal. Identical
  # regardless of provider. (STRIPE_* env vars are still honored as defaults for
  # backward compatibility with existing deployments.)
  redirect:
    success-url: ${BILLING_SUCCESS_URL:${STRIPE_SUCCESS_URL:${FRONTEND_BASE_URL:http://localhost:5173}/dashboard/billing?checkout=success}}
    cancel-url: ${BILLING_CANCEL_URL:${STRIPE_CANCEL_URL:${FRONTEND_BASE_URL:http://localhost:5173}/dashboard/billing?checkout=cancelled}}
    portal-return-url: ${BILLING_PORTAL_RETURN_URL:${STRIPE_PORTAL_RETURN_URL:${FRONTEND_BASE_URL:http://localhost:5173}/dashboard/billing}}
  # Customer-facing document presentation. "direct-merchant" (Stripe) issues a real
  # tax invoice as BunnyCal. "mor-record-only" (Dodo) issues an internal "Payment
  # Summary" and names the Merchant of Record that issued the official receipt.
  invoice-presentation:
    mode: ${BILLING_INVOICE_MODE:direct-merchant}
    seller-name: ${BILLING_SELLER_NAME:BunnyCal}
    merchant-of-record-name: ${BILLING_MOR_NAME:Dodo Payments}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    # Signing secret for the webhook endpoint (whsec_...). Verified on every callback.
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  dodo:
    # Dodo API key (Bearer token). Used for /checkouts, /customers, /subscriptions, /refunds.
    api-key: ${DODO_API_KEY:}
    # Standard-Webhooks signing secret used to verify the webhook-signature header.
    webhook-secret: ${DODO_WEBHOOK_SECRET:}
    # When true, the API targets test.dodopayments.com; otherwise live.dodopayments.com.
    test-mode: ${DODO_TEST_MODE:true}

draft:
  ttl:
    days: ${DRAFT_TTL_DAYS:21}
  reaper:
    enabled: ${DRAFT_REAPER_ENABLED:false}
    interval-ms: ${DRAFT_REAPER_INTERVAL_MS:60000}

zoom:
  oauth:
    client-id: ${ZOOM_CLIENT_ID:}
    client-secret: ${ZOOM_CLIENT_SECRET:}
    # Must byte-for-byte match a URL in the Zoom app's OAuth allow list. Zoom
    # rejects the hostname "localhost"; 127.0.0.1 is the allowed local form.
    redirect-uri: ${ZOOM_REDIRECT_URI:http://127.0.0.1:8080/integrations/conferencing/zoom/callback}
    frontend-success-redirect: ${ZOOM_FRONTEND_SUCCESS_REDIRECT:http://localhost:5173/dashboard/integrations}
    frontend-error-redirect: ${ZOOM_FRONTEND_ERROR_REDIRECT:http://localhost:5173/calendar-error}
    # Secret Token from the Zoom app's Features > Access (webhook) section; used to
    # verify x-zm-signature on deauthorization events.
    webhook-secret-token: ${ZOOM_WEBHOOK_SECRET_TOKEN:}

kind: Application

server:
  forward-headers-strategy: framework
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
