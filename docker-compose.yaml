  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - bunnycal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - bunnycal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - bunnycal

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # Internal-only by default: Prometheus is reachable on the Compose network
    # (e.g. by Grafana at http://prometheus:9090) and is NOT published to the
    # public internet. Bind to loopback so it is reachable only via an SSH
    # tunnel to the VM (ssh -L 9090:127.0.0.1:9090 ...).
    ports:
      - "127.0.0.1:9090:9090"
#    depends_on:
#      - bunnycal-api
    restart: unless-stopped
    networks:
      - bunnycal

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      # Credentials come from env vars — fail fast if unset (no admin/admin
      # fallback). The "?err" form makes `docker compose up` abort with a clear
      # message when GRAFANA_ADMIN_PASSWORD is missing.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    # Internal-only by default: not published to the public internet. Bind to
    # loopback so Grafana is reachable only via an SSH tunnel to the VM
    # (ssh -L 3000:127.0.0.1:3000 ...).
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - bunnycal

networks:
  bunnycal:

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
#  caddy_data:
#  caddy_config:
