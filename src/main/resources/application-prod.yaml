spring:
  application:
    name: BunnyCal

  # ---------------------------------------------------------------------------
  # PRODUCTION profile.
  #
  # This profile is merged ON TOP of application.yaml. Everything sensitive or
  # environment-specific is re-declared here WITHOUT an insecure fallback so the
  # application FAILS FAST at startup when a required value is missing, instead
  # of silently booting with a known-weak default.
  #
  # Networking uses Docker service names (postgres / redis / otel-collector),
  # never localhost. All runtime values come from the .env file consumed by
  # docker-compose.yaml.
  # ---------------------------------------------------------------------------

  datasource:
    # Service-name networking inside the Compose network. The full URL is also
    # injected by docker-compose; this keeps prod correct even if run directly.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/${POSTGRES_DB}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:30}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT_MS:5000}
      # Leak detection is a dev/staging aid; disabled in prod to avoid spurious
      # WARN noise under sustained load. Re-enable via env if debugging a leak.
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_MS:0}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME_MS:1800000}

  data:
    redis:
      # Docker service name — no localhost in production.
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT:587}
    # Generic names support any SMTP provider; the AWS names remain as a compatibility fallback.
    username: ${SPRING_MAIL_USERNAME:${AWS_SES_SMTP_USERNAME}}
    password: ${SPRING_MAIL_PASSWORD:${AWS_SES_SMTP_PASSWORD}}

  # Spring Boot Docker Compose support is a local-dev convenience only. The
  # production runtime stack is orchestrated by the top-level docker-compose.yaml.
  docker:
    compose:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          microsoft:
            provider: microsoft
            client-id: ${MICROSOFT_CLIENT_ID:disabled-microsoft-client-id}
            client-secret: ${MICROSOFT_CLIENT_SECRET:disabled-microsoft-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
              - User.Read
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            jwk-set-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/discovery/v2.0/keys
            user-name-attribute: sub

jdbc:
  opentelemetry:
    analysis:
      enabled: ${JDBC_OPENTELEMETRY_ANALYSIS_ENABLED:false}

management:
  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:false}
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://otel-collector:4318/v1/metrics}
        step: 10s
        connect-timeout: 2s
        read-timeout: 5s

  metrics:
    tags:
      application: ${spring.application.name}

  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

jwt:
  # Fail fast: no insecure fallback in production.
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

auth:
  access-token:
    cookie-fallback-enabled: ${AUTH_ACCESS_TOKEN_COOKIE_FALLBACK_ENABLED:false}
  refresh-token:
    bytes: ${REFRESH_TOKEN_BYTES:48}
    ttl-days: ${REFRESH_TOKEN_TTL_DAYS:1}

logging:
  level:
    org.flywaydb: INFO

calendar:
  sync:
    # Phase 4 parallel sweep — default OFF; flip CALENDAR_SYNC_PARALLEL_ENABLED=true per
    # environment once validated. sweep-max-runtime MUST stay below the scheduler's
    # @SchedulerLock lockAtMostFor (PT2M) so sweeps never overlap across replicas.
    parallel-enabled: ${CALENDAR_SYNC_PARALLEL_ENABLED:false}
    parallelism: ${CALENDAR_SYNC_PARALLELISM:8}
    provider-acquire-timeout-ms: ${CALENDAR_SYNC_PROVIDER_ACQUIRE_TIMEOUT_MS:150}
    sweep-max-runtime: ${CALENDAR_SYNC_SWEEP_MAX_RUNTIME:PT25S}
    # Webhook-fresh poll gating — default OFF; flip CALENDAR_SYNC_WEBHOOK_FRESH_GATING_ENABLED
    # per environment only after the parallel sweep is stable and webhook delivery is healthy.
    webhook-fresh-gating-enabled: ${CALENDAR_SYNC_WEBHOOK_FRESH_GATING_ENABLED:false}
    webhook-fresh-backstop: ${CALENDAR_SYNC_WEBHOOK_FRESH_BACKSTOP:PT15M}
    incremental:
      enabled: ${CALENDAR_SYNC_INCREMENTAL_ENABLED:true}
      shadow-mode: ${CALENDAR_SYNC_INCREMENTAL_SHADOW_MODE:false}
      stale-cursor-max-age-hours: ${CALENDAR_SYNC_INCREMENTAL_STALE_CURSOR_MAX_AGE_HOURS:168}
  webhook:
    enabled: ${CALENDAR_WEBHOOK_ENABLED:false}
    auth:
      require-signature: ${CALENDAR_WEBHOOK_REQUIRE_SIGNATURE:true}
      max-skew-seconds: ${CALENDAR_WEBHOOK_MAX_SKEW_SECONDS:300}
    replay-capture:
      enabled: ${CALENDAR_WEBHOOK_REPLAY_CAPTURE_ENABLED:true}
    provider:
      google:
        enabled: ${CALENDAR_WEBHOOK_PROVIDER_GOOGLE_ENABLED:true}
        address: ${GOOGLE_WEBHOOK:https://api.bunnycal.io/integrations/calendar/webhooks/google}
      microsoft:
        enabled: ${CALENDAR_WEBHOOK_PROVIDER_MICROSOFT_ENABLED:true}
        address: ${MICROSOFT_WEBHOOK:https://api.bunnycal.io/integrations/calendar/webhooks/microsoft}
        ttl-seconds: ${CALENDAR_WEBHOOK_PROVIDER_MICROSOFT_TTL_SECONDS:7200}
    # Fail fast: no insecure fallback in production.
    shared-secret: ${CALENDAR_WEBHOOK_SHARED_SECRET}
  google:
    diagnostics:
      enabled: ${CALENDAR_GOOGLE_DIAGNOSTICS_ENABLED:false}
  security:
    # Fail fast: no insecure fallback in production.
    encryption-key-base64: ${CALENDAR_TOKEN_ENCRYPTION_KEY_BASE64}
    oauth-state-secret: ${CALENDAR_OAUTH_STATE_SECRET}

sync:
  projection:
    accept-ambiguous: ${SYNC_PROJECTION_ACCEPT_AMBIGUOUS:false}
  reconcile:
    external-lifecycle:
      enabled: ${SYNC_RECONCILE_EXTERNAL_LIFECYCLE_ENABLED:true}
  invariants:
    fail-fast: ${SYNC_INVARIANTS_FAIL_FAST:false}

google:
  oauth:
    # Fail fast: real Google OAuth credentials are required in production.
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:https://api.bunnycal.io/integrations/calendar/google/callback}
    frontend-base-url: ${FRONTEND_BASE_URL:https://bunnycal.io}
    frontend-success-path: ${GOOGLE_FRONTEND_SUCCESS_PATH:/dashboard/integrations}
    frontend-error-path: ${GOOGLE_FRONTEND_ERROR_PATH:/calendar-error}
    frontend-success-redirect: ${GOOGLE_FRONTEND_SUCCESS_REDIRECT:}
    frontend-error-redirect: ${GOOGLE_FRONTEND_ERROR_REDIRECT:}
    scopes:
      - openid
      - email
      - profile
      - https://www.googleapis.com/auth/calendar.events
      - https://www.googleapis.com/auth/calendar.readonly

microsoft:
  oauth:
    client-id: ${MICROSOFT_CLIENT_ID:}
    client-secret: ${MICROSOFT_CLIENT_SECRET:}
    tenant-id: ${MICROSOFT_TENANT_ID:common}
    redirect-uri: ${MICROSOFT_REDIRECT_URI:https://api.bunnycal.io/integrations/calendar/microsoft/callback}
    frontend-base-url: ${FRONTEND_BASE_URL:https://bunnycal.io}
    frontend-success-path: ${MICROSOFT_FRONTEND_SUCCESS_PATH:/dashboard/integrations}
    frontend-error-path: ${MICROSOFT_FRONTEND_ERROR_PATH:/calendar-error}
    frontend-success-redirect: ${MICROSOFT_FRONTEND_SUCCESS_REDIRECT:}
    frontend-error-redirect: ${MICROSOFT_FRONTEND_ERROR_REDIRECT:}
    scopes:
      - openid
      - profile
      - email
      - offline_access
      - User.Read
      - Calendars.ReadWrite
      - Calendars.Read

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:https://bunnycal.io}
  admin-base-url: ${APP_ADMIN_BASE_URL:https://admin.bunnycal.io}
  security:
    cors:
      # No localhost origins in production.
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:https://bunnycal.io}
      admin-allowed-origins: ${APP_SECURITY_CORS_ADMIN_ALLOWED_ORIGINS:https://admin.bunnycal.io}
  docs:
    # API docs stay private in production unless explicitly enabled.
    public-enabled: ${APP_DOCS_PUBLIC_ENABLED:false}
  embed:
    token-secret: ${APP_EMBED_TOKEN_SECRET}
    token-ttl-seconds: ${APP_EMBED_TOKEN_TTL_SECONDS:7200}

booking:
  confirm:
    async-calendar:
      enabled: ${BOOKING_CONFIRM_ASYNC_CALENDAR_ENABLED:true}
    shadow-compare:
      enabled: ${BOOKING_CONFIRM_SHADOW_COMPARE_ENABLED:false}
  public:
    require-capability-token: ${BOOKING_PUBLIC_REQUIRE_CAPABILITY_TOKEN:true}
    capability-token-ttl-days: ${BOOKING_PUBLIC_CAPABILITY_TOKEN_TTL_DAYS:14}
    capability-token-legacy-cutoff: ${BOOKING_PUBLIC_CAPABILITY_TOKEN_LEGACY_CUTOFF:}
  notifications:
    enabled: ${BOOKING_NOTIFICATIONS_ENABLED:true}
    # From is aligned with the iTIP ORGANIZER identity at send time (Outlook treats
    # From != ORGANIZER as a foreign invite). Keep this mailbox SPF/DKIM/DMARC-aligned.
    from: ${BOOKING_NOTIFICATIONS_FROM}
    calendar-organizer-email: ${BOOKING_NOTIFICATIONS_CALENDAR_ORGANIZER_EMAIL}
    calendar-organizer-name: ${BOOKING_NOTIFICATIONS_CALENDAR_ORGANIZER_NAME:BunnyCal Calendar}
    # Debug-only .eml dumping is disabled in production by leaving this empty.
    debug-eml-dir: ${BOOKING_NOTIFICATIONS_DEBUG_EML_DIR:}

billing:
  # Master switch for the SaaS subscription billing module. Disabled by default so
  # dev/test boot without provider credentials; enable in environments that have the
  # active provider's secrets configured. Mirrors the booking.notifications.enabled pattern.
  enabled: ${BILLING_ENABLED:false}
  # Active payment provider: "stripe" (direct merchant) or "dodo" (Merchant of Record).
  # Switching providers is a single env-var change — no code change. Selects which
  # PaymentProvider bean loads (@ConditionalOnProperty).
  provider: ${BILLING_PROVIDER:stripe}
  # Exposes /api/admin/billing (coupons, promo codes, manual discounts). Off by default;
  # there is no admin-role system yet, so keep this disabled outside trusted operators.
  admin:
    enabled: ${BILLING_ADMIN_ENABLED:false}
  # Trial duration is owned exclusively by subscription_plans.trial_days. Each user's
  # immutable deadline is copied to subscriptions.trial_end when their trial starts.
  # Grace window after a failed renewal before access is revoked (PAST_DUE -> EXPIRED).
  grace-days: ${BILLING_GRACE_DAYS:3}
  # Trial expiration runs each minute, reminders daily, and dunning hourly. ShedLock-guarded.
  trial-expiration:
    # Persists TRIAL -> EXPIRED promptly; entitlement also checks trial_end synchronously.
    cron: ${BILLING_TRIAL_EXPIRATION_CRON:0 * * * * *}
  trial-reminder:
    cron: ${BILLING_TRIAL_REMINDER_CRON:0 0 9 * * *}
  dunning:
    cron: ${BILLING_DUNNING_CRON:0 30 * * * *}
  notifications:
    enabled: ${BILLING_NOTIFICATIONS_ENABLED:false}
    # Billing keeps its own From identity, separate from booking/calendar mail. A spam
    # complaint on a dunning notice must not degrade the sending reputation of booking
    # confirmations, so the two streams stay on distinct mailboxes and display names.
    from: ${BILLING_NOTIFICATIONS_FROM:billing@bunnycal.io}
    from-name: ${BILLING_NOTIFICATIONS_FROM_NAME:BunnyCal Billing}
  # Processor / Merchant-of-Record fee rate (basis points; 500 = 5%) used to ESTIMATE fees
  # and net in the admin Revenue report. Per-transaction fees are not persisted, so this is
  # an estimate. 0 (default) = not configured: the report shows fees/net as unavailable.
  fees:
    processor-percent-bps: ${BILLING_FEES_PROCESSOR_PERCENT_BPS:0}
  # Provider-neutral redirect URLs for hosted Checkout / Customer Portal. Identical
  # regardless of provider. (STRIPE_* env vars are still honored as defaults for
  # backward compatibility with existing deployments.)
  redirect:
    success-url: ${BILLING_SUCCESS_URL:${STRIPE_SUCCESS_URL:${FRONTEND_BASE_URL:}/dashboard/billing?checkout=success}}
    cancel-url: ${BILLING_CANCEL_URL:${STRIPE_CANCEL_URL:${FRONTEND_BASE_URL:}/dashboard/billing?checkout=cancelled}}
    portal-return-url: ${BILLING_PORTAL_RETURN_URL:${STRIPE_PORTAL_RETURN_URL:${FRONTEND_BASE_URL:}/dashboard/billing}}
  # Customer-facing document presentation. "direct-merchant" (Stripe) issues a real
  # tax invoice as BunnyCal. "mor-record-only" (Dodo) issues an internal "Payment
  # Summary" and names the Merchant of Record that issued the official receipt.
  invoice-presentation:
    mode: ${BILLING_INVOICE_MODE:t}
    seller-name: ${BILLING_SELLER_NAME:BunnyCal}
    merchant-of-record-name: ${BILLING_MOR_NAME:Dodo Payments}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    # Signing secret for the webhook endpoint (whsec_...). Verified on every callback.
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  dodo:
    # Dodo API key (Bearer token). Used for /checkouts, /customers, /subscriptions, /refunds.
    api-key: ${DODO_API_KEY:}
    # Standard-Webhooks signing secret used to verify the webhook-signature header.
    webhook-secret: ${DODO_WEBHOOK_SECRET:}
    # When true, the API targets test.dodopayments.com; otherwise live.dodopayments.com.
    test-mode: ${DODO_TEST_MODE:}

# Host-direct event commerce. Kept separate from BunnyCal subscription billing.
commerce:
  enabled: ${COMMERCE_ENABLED:false}
  frontend-base-url: ${FRONTEND_BASE_URL:}
  stripe:
    secret-key: ${COMMERCE_STRIPE_SECRET_KEY:}
    publishable-key: ${COMMERCE_STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${COMMERCE_STRIPE_WEBHOOK_SECRET:}
    onboarding-return-url: ${COMMERCE_STRIPE_ONBOARDING_RETURN_URL:${FRONTEND_BASE_URL:}/dashboard/integrations?payment=connected}
    onboarding-refresh-url: ${COMMERCE_STRIPE_ONBOARDING_REFRESH_URL:${FRONTEND_BASE_URL:}/dashboard/integrations?payment=refresh}
  paypal:
    enabled: ${COMMERCE_PAYPAL_ENABLED:false}
    client-id: ${COMMERCE_PAYPAL_CLIENT_ID:}
    client-secret: ${COMMERCE_PAYPAL_CLIENT_SECRET:}
    partner-merchant-id: ${COMMERCE_PAYPAL_PARTNER_MERCHANT_ID:}
    partner-attribution-id: ${COMMERCE_PAYPAL_PARTNER_ATTRIBUTION_ID:}
    webhook-id: ${COMMERCE_PAYPAL_WEBHOOK_ID:}
    onboarding-return-url: ${COMMERCE_PAYPAL_ONBOARDING_RETURN_URL:${FRONTEND_BASE_URL:}/dashboard/integrations?payment=paypal}
    api-base-url: ${COMMERCE_PAYPAL_API_BASE_URL:https://api-m.sandbox.paypal.com}
  reconciliation:
    fixed-delay-ms: ${COMMERCE_RECONCILIATION_FIXED_DELAY_MS:30000}


draft:
  ttl:
    days: ${DRAFT_TTL_DAYS:21}
  reaper:
    enabled: ${DRAFT_REAPER_ENABLED:true}
    interval-ms: ${DRAFT_REAPER_INTERVAL_MS:60000}

zoom:
  oauth:
    client-id: ${ZOOM_CLIENT_ID:}
    client-secret: ${ZOOM_CLIENT_SECRET:}
    redirect-uri: ${ZOOM_REDIRECT_URI:https://api.bunnycal.io/integrations/conferencing/zoom/callback}
    frontend-success-redirect: ${ZOOM_FRONTEND_SUCCESS_REDIRECT:https://bunnycal.io/dashboard/integrations}
    frontend-error-redirect: ${ZOOM_FRONTEND_ERROR_REDIRECT:https://bunnycal.io/calendar-error}
    webhook-secret-token: ${ZOOM_WEBHOOK_SECRET_TOKEN:}

kind: Application

server:
  forward-headers-strategy: framework
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
