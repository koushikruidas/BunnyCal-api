calendar:
  webhook:
    enabled: true
    provider:
      google:
        enabled: true
      microsoft:
        enabled: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
  docker:
    compose:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    export:
      otlp:
        enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

jwt:
  secret: ${JWT_SECRET}

calendar:
  webhook:
    shared-secret: ${CALENDAR_WEBHOOK_SHARED_SECRET}
  security:
    encryption-key-base64: ${CALENDAR_TOKEN_ENCRYPTION_KEY_BASE64}
    oauth-state-secret: ${CALENDAR_OAUTH_STATE_SECRET}

app:
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS}
